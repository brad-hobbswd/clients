<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,sans-serif;

background:#060818;

color:white;

min-height:100vh;

display:flex;

flex-direction:column;

overflow:hidden;

position:relative;
}


/* glowing background */

body:before{

content:"";

position:fixed;

width:400px;
height:400px;

background:#7c3aed;

top:-150px;
left:-150px;

border-radius:50%;

filter:blur(120px);

opacity:.35;

z-index:-1;
}

body:after{

content:"";

position:fixed;

width:350px;
height:350px;

background:#00d4ff;

bottom:-150px;
right:-150px;

border-radius:50%;

filter:blur(120px);

opacity:.35;

z-index:-1;
}



.wrapper{

flex:1;

display:flex;

justify-content:center;

align-items:center;

padding:25px;
}



.box{

max-width:700px;

padding:50px;

text-align:center;

background:

rgba(
255,
255,
255,
.06
);

border:
1px solid
rgba(
255,
255,
255,
.08
);

backdrop-filter:
blur(20px);

border-radius:35px;
}



.big{

font-size:7rem;

line-height:1;

margin-bottom:15px;
}


h2{

margin-bottom:20px;

font-size:2rem;
}


p{

opacity:.8;

line-height:1.8;

margin-bottom:30px;
}



.btn{

display:inline-block;

padding:
14px
28px;

background:white;

color:#111;

text-decoration:none;

font-weight:bold;

border-radius:999px;

transition:.35s;
}

.btn:hover{

transform:
translateY(-6px);

}



.siteFooter{

padding:35px 20px;

text-align:center;

background:

rgba(
255,
255,
255,
.04
);

backdrop-filter:
blur(20px);

border-top:
1px solid
rgba(
255,
255,
255,
.08
);
}


.footerBrand{

font-size:1.2rem;

font-weight:bold;

margin-bottom:10px;
}


.footerLinks{

display:flex;

justify-content:center;

gap:18px;

flex-wrap:wrap;

margin:20px 0;
}


.footerLinks a{

color:white;

text-decoration:none;

opacity:.8;
}

.footerLinks a:hover{

opacity:1;
}
